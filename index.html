<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palette</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --muted: #686f78;
        --paper: #f7f4ee;
        --line: #ded8cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--paper);
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        display: grid;
        gap: 12px;
        margin-bottom: 36px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 6vw, 5.5rem);
        line-height: 0.95;
        font-weight: 760;
      }

      p {
        margin: 0;
        max-width: 620px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        min-height: 520px;
        border: 1px solid var(--line);
      }

      .swatch {
        display: flex;
        align-items: end;
        min-height: 360px;
        padding: 18px;
      }

      .swatch:nth-child(1) { background: #f05d5e; }
      .swatch:nth-child(2) { background: #f6c85f; }
      .swatch:nth-child(3) { background: #4db6ac; }
      .swatch:nth-child(4) { background: #4059ad; color: #f7f4ee; }
      .swatch:nth-child(5) { background: #2f2d2e; color: #f7f4ee; }

      .label {
        display: grid;
        gap: 6px;
      }

      .name {
        font-size: 0.9rem;
        font-weight: 720;
        text-transform: uppercase;
      }

      .hex {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.82rem;
        opacity: 0.78;
      }

      @media (max-width: 760px) {
        main {
          padding: 36px 0;
        }

        .palette {
          grid-template-columns: 1fr;
          min-height: 0;
        }

        .swatch {
          min-height: 132px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Palette</h1>
        <p>一个干净的色板页面，用来保存和展示一组醒目的颜色。</p>
      </header>

      <section class="palette" aria-label="Color palette">
        <article class="swatch">
          <div class="label">
            <span class="name">Coral</span>
            <span class="hex">#F05D5E</span>
          </div>
        </article>
        <article class="swatch">
          <div class="label">
            <span class="name">Marigold</span>
            <span class="hex">#F6C85F</span>
          </div>
        </article>
        <article class="swatch">
          <div class="label">
            <span class="name">Seafoam</span>
            <span class="hex">#4DB6AC</span>
          </div>
        </article>
        <article class="swatch">
          <div class="label">
            <span class="name">Indigo</span>
            <span class="hex">#4059AD</span>
          </div>
        </article>
        <article class="swatch">
          <div class="label">
            <span class="name">Graphite</span>
            <span class="hex">#2F2D2E</span>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
